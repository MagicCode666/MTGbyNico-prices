name: Mise à jour prix journalière

on:
  schedule:
    - cron: '0 3 * * *'   # 3h UTC chaque nuit
  workflow_dispatch:        # déclenchement manuel possible

permissions:
  contents: write           # nécessaire pour pousser les fichiers générés

jobs:
  fetch-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer dépendances
        run: pip install requests

      - name: Générer le fichier de prix
        run: python scripts/fetch_prices.py

      - name: Commit et push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices/
          # Ne commit que si des fichiers ont changé
          git diff --cached --quiet || git commit -m "chore: prix $(date -u +%Y-%m-%d)"
          git push
